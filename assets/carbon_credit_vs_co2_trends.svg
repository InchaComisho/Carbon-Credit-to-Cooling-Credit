<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="980" viewBox="0 0 1200 980" role="img" aria-label="CO2 concentration emissions carbon pricing revenue and carbon sink limit">
  <rect width="1200" height="980" fill="#f8fafc"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#0f172a">CO₂ Flow, Stock, Carbon Pricing, and Sink Limit</text>
  <text x="40" y="82" font-family="Arial, sans-serif" font-size="16" fill="#475569">Annual emissions are a flow. Atmospheric CO₂ is a stock. As long as emissions exceed natural and managed absorption, CO₂ keeps accumulating.</text>

  <g font-family="Arial, sans-serif" font-size="12" fill="#111827">
    <g transform="translate(40,125)">
      <rect width="520" height="300" rx="14" fill="#ffffff" stroke="#d1d5db"/>
      <text x="22" y="32" font-size="20" font-weight="700">1. Atmospheric CO₂ Concentration Keeps Accumulating</text>
      <text x="22" y="55" fill="#64748b">Stock indicator: Mauna Loa annual mean, ppm</text>
      <line x1="60" y1="245" x2="480" y2="245" stroke="#111827"/>
      <line x1="60" y1="70" x2="60" y2="245" stroke="#111827"/>
      <polyline points="60,238 73,235 137,222 201,203 264,179 328,154 392,124 456,84 480,70" fill="none" stroke="#2563eb" stroke-width="4"/>
      <text x="60" y="267">1958</text><text x="430" y="267">2024</text>
      <text x="16" y="243">310</text><text x="16" y="78">430</text>
      <text x="22" y="288" fill="#64748b">Source: NOAA Global Monitoring Laboratory</text>
    </g>

    <g transform="translate(640,125)">
      <rect width="520" height="300" rx="14" fill="#ffffff" stroke="#d1d5db"/>
      <text x="22" y="32" font-size="20" font-weight="700">2. Global Annual CO₂ Emissions Remain Historically High</text>
      <text x="22" y="55" fill="#64748b">Flow indicator: GtCO₂ per year</text>
      <line x1="60" y1="245" x2="480" y2="245" stroke="#111827"/>
      <line x1="60" y1="70" x2="60" y2="245" stroke="#111827"/>
      <polyline points="60,238 127,202 193,176 260,155 327,139 393,88 440,72 447,70 453,70 460,84 467,73 473,66 480,63" fill="none" stroke="#16a34a" stroke-width="4"/>
      <circle cx="460" cy="84" r="4" fill="#16a34a"/>
      <text x="322" y="106" fill="#64748b">temporary pandemic decline</text>
      <text x="60" y="267">1960</text><text x="430" y="267">2023</text>
      <text x="20" y="243">8</text><text x="20" y="78">40</text>
      <text x="22" y="288" fill="#64748b">Source: Our World in Data / Global Carbon Project</text>
    </g>

    <g transform="translate(40,500)">
      <rect width="520" height="300" rx="14" fill="#ffffff" stroke="#d1d5db"/>
      <text x="22" y="32" font-size="20" font-weight="700">3. Carbon Pricing Revenue Grows</text>
      <text x="22" y="55" fill="#64748b">USD billion, simplified annual reported values</text>
      <line x1="60" y1="245" x2="480" y2="245" stroke="#111827"/>
      <line x1="60" y1="70" x2="60" y2="245" stroke="#111827"/>
      <polyline points="60,238 130,214 200,212 270,194 340,126 410,102 480,82" fill="none" stroke="#7c3aed" stroke-width="4"/>
      <text x="60" y="267">2017</text><text x="430" y="267">2023</text>
      <text x="16" y="243">30</text><text x="12" y="78">110</text>
      <text x="22" y="288" fill="#64748b">Source: World Bank State and Trends reports; illustrative series</text>
    </g>

    <g transform="translate(640,500)">
      <rect width="520" height="300" rx="14" fill="#ffffff" stroke="#d1d5db"/>
      <text x="22" y="32" font-size="20" font-weight="700">4. Flow vs Stock: Why CO₂ Keeps Rising</text>
      <text x="22" y="55" fill="#64748b">Illustrative annual balance, CO₂ equivalent</text>
      <g transform="translate(40,88)">
        <rect x="0" y="75" width="140" height="92" rx="10" fill="#fee2e2" stroke="#ef4444"/>
        <text x="70" y="105" text-anchor="middle" font-size="26" font-weight="800" fill="#991b1b">~41</text>
        <text x="70" y="128" text-anchor="middle" fill="#991b1b">GtCO₂/yr</text>
        <text x="70" y="149" text-anchor="middle" fill="#991b1b">human emissions</text>
        <path d="M150 120 H235" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
        <rect x="245" y="38" width="145" height="70" rx="10" fill="#dcfce7" stroke="#16a34a"/>
        <text x="317" y="66" text-anchor="middle" font-size="22" font-weight="800" fill="#166534">~22</text>
        <text x="317" y="88" text-anchor="middle" fill="#166534">absorbed</text>
        <text x="317" y="106" text-anchor="middle" fill="#166534">land + ocean</text>
        <rect x="245" y="145" width="145" height="70" rx="10" fill="#dbeafe" stroke="#2563eb"/>
        <text x="317" y="174" text-anchor="middle" font-size="22" font-weight="800" fill="#1e40af">~19</text>
        <text x="317" y="196" text-anchor="middle" fill="#1e40af">left in air</text>
        <text x="317" y="214" text-anchor="middle" fill="#1e40af">accumulates</text>
        <path d="M235 120 C230 78 235 73 245 73" stroke="#111827" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
        <path d="M235 120 C230 178 235 180 245 180" stroke="#111827" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
      </g>
      <text x="22" y="273" fill="#64748b">Key point: even flat emissions keep raising CO₂ concentration unless net emissions approach zero.</text>
    </g>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827"/>
    </marker>
  </defs>

  <text x="40" y="870" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Corrected interpretation</text>
  <text x="40" y="898" font-family="Arial, sans-serif" font-size="15" fill="#334155">Carbon pricing may expand while global emissions remain historically high. Because emissions are a flow and atmospheric CO₂ is a stock, CO₂ concentration rises whenever residual emissions exceed total absorption.</text>
  <text x="40" y="925" font-family="Arial, sans-serif" font-size="15" fill="#334155">If natural carbon sinks and cooling functions weaken through drought, wildfire, soil degradation, forest loss, and ocean heat, the remaining atmospheric burden and heat risk can worsen.</text>
</svg>
